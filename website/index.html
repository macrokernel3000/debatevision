<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>辯語視界 DebateVision｜思辨教育活動抽卡工具</title>
    <meta
      name="description"
      content="辯語視界 DebateVision 是給老師與教練使用的思辨教育活動網站，透過異境求生、存席辯護、誰更重要、推理解密、銷售密令等抽卡玩法，快速產生課堂討論、口語表達與辯論暖身活動。"
    />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="辯語視界 DebateVision" />
    <meta name="theme-color" content="#111111" />
    <link rel="canonical" href="https://macrokernel3000.github.io/debatevision/website/" />
    <meta property="og:locale" content="zh_TW" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="辯語視界 DebateVision｜思辨教育活動抽卡工具" />
    <meta
      property="og:description"
      content="用 CSV 詞庫與抽卡玩法產生思辨教育活動，適合辯論課、口語表達、課堂討論與即興說服練習。"
    />
    <meta property="og:url" content="https://macrokernel3000.github.io/debatevision/website/" />
    <meta name="twitter:card" content="summary" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "辯語視界 DebateVision",
        "url": "https://macrokernel3000.github.io/debatevision/website/",
        "description": "給老師與教練使用的思辨教育活動抽卡工具，支援辯論暖身、口語表達、比較判準與即興說服活動。",
        "inLanguage": "zh-Hant",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any"
      }
    </script>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">DebateVision</p>
          <h1 id="app-title">辯語視界</h1>
          <p class="tagline">Every Thought Begins with a Question. <span>思想始於思考</span></p>
        </div>
        <button class="activity-menu-toggle" id="activityMenuToggle" type="button" aria-expanded="false" aria-controls="activityMenu">
          <span aria-hidden="true">☰</span>
          <span class="sr-only">開啟活動列表</span>
        </button>
      </header>

      <div class="activity-menu" id="activityMenu" hidden>
        <div class="activity-menu-panel" role="menu" aria-label="活動列表"></div>
      </div>

      <section class="stage-panel" aria-labelledby="app-title">
        <div class="scene-track" id="modeGrid" aria-label="選擇活動"></div>
      </section>

      <section class="card-dictionary-panel" aria-label="卡片字典">
        <div class="section-head">
          <p class="eyebrow">Card Dictionary</p>
          <h2>卡片字典</h2>
        </div>
        <p class="dictionary-intro">
          先勾選想使用的卡片類型，再從各卡池中直接挑選本場要用的卡，方便老師臨時設計自己的活動。
        </p>
        <div class="dictionary-strip" id="cardDictionary"></div>
        <div class="dictionary-actions">
          <button id="drawDictionaryCards" type="button">儲存成這場</button>
          <button id="clearDictionaryDecks" type="button">清空本場</button>
        </div>
        <div class="dictionary-result" id="dictionaryResult"></div>
      </section>

      <section class="control-band" aria-label="抽卡控制台">
        <div class="selector-row">
          <label class="field" id="primaryDeckField">
            <span id="primaryDeckLabel">主要詞庫</span>
            <select id="deckSelect"></select>
          </label>

          <label class="field" id="secondaryDeckField">
            <span id="secondaryDeckLabel">環境詞庫</span>
            <select id="secondaryDeckSelect"></select>
          </label>

          <label class="field">
            <span data-ui-text="label.drawCount">抽取數量</span>
            <input id="drawCount" type="number" min="1" max="6" value="1" />
          </label>

          <p class="control-note" id="controlNote">詞庫來自 CSV；改完後雙擊網站更新即可同步。</p>
          <div class="fixed-pools" id="fixedPools"></div>
        </div>

        <div class="machine" aria-live="polite">
          <div class="reel" id="reel">
            <div class="reel-scene-mark">?</div>
            <div class="reel-scene-copy">
              <span>異境卡</span>
              <strong>準備抽卡</strong>
              <small>抽出後，這裡會顯示本輪結果。</small>
            </div>
          </div>
          <button class="primary-action" id="drawButton" type="button">抽出求生組合</button>
        </div>
      </section>

      <section class="play-area" aria-label="活動卡牌與提示">
        <div class="cards-zone">
          <div class="section-head">
            <p class="eyebrow" data-ui-text="section.drawn.eyebrow">Drawn Cards</p>
            <h2 data-ui-text="section.drawn.title">本輪卡牌</h2>
          </div>
          <div class="card-grid" id="cardGrid"></div>
        </div>
      </section>

      <section class="history-panel" aria-label="抽卡記憶">
        <div class="section-head">
          <p class="eyebrow">Memory Log</p>
          <h2>最近十場</h2>
        </div>
        <div class="draw-history" id="drawHistory"></div>
      </section>

      <section class="library-band" aria-label="詞庫預覽">
        <div class="section-head">
          <p class="eyebrow" data-ui-text="section.library.eyebrow">Lexicon</p>
          <h2 data-ui-text="section.library.title">本局抽選池</h2>
        </div>
        <div class="library-tools" id="libraryTools"></div>
        <div class="pool-actions">
          <button id="selectAllCards" type="button" data-ui-text="button.pool.selectAll">全選目前牌組</button>
          <button id="clearCards" type="button" data-ui-text="button.pool.clear">取消目前牌組</button>
          <button id="resetActivePool" type="button" data-ui-text="button.pool.reset">重置本玩法</button>
        </div>
        <div class="token-cloud" id="tokenCloud"></div>
      </section>
    </main>

    <script src="../data/generated/decks.js"></script>
    <script src="../data/generated/modes.js"></script>
    <script src="../data/generated/image-layouts.js"></script>
    <script src="../data/generated/ui-texts.js"></script>
    <script src="./js/icons.js"></script>
    <script src="./js/mode-lifecycle.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
